<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAP TAP WAR - Game</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700;800&display=swap');

    :root {
      --primary-red: #FF2D55;
      --primary-dark-red: #C41E3A;
      --dark-bg: #000000;
      --card-bg: rgba(28, 28, 30, 0.85);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --vip-gold: #FFD700;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--dark-bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      backdrop-filter: blur(10px);
      background: rgba(28, 28, 30, 0.5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-logo {
      font-weight: 700;
      font-size: 20px;
      color: var(--text-primary);
      text-decoration: none;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .vip-badge-nav {
      background: linear-gradient(135deg, #FFD700, #FF9500);
      color: #000;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
    }

    .game-container {
      max-width: 600px;
      margin: 30px auto;
      padding: 20px;
    }

    .stats-bar {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
      margin-bottom: 30px;
    }

    .stat-box {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary-red);
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 5px;
      text-transform: uppercase;
    }

    .monster-box {
      background: var(--card-bg);
      border: 2px solid var(--primary-red);
      border-radius: 16px;
      padding: 40px 20px;
      text-align: center;
      margin-bottom: 30px;
      cursor: pointer;
      transition: transform 0.1s;
      user-select: none;
    }

    .monster-box:active {
      transform: scale(0.95);
    }

    .monster-emoji {
      font-size: 100px;
      margin-bottom: 20px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .monster-level {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 15px;
    }

    .hp-bar {
      width: 100%;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .hp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary-red), #FF6B6B);
      transition: width 0.2s;
    }

    .hp-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .buttons-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary-red), var(--primary-dark-red));
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn.secondary {
      background: rgba(255, 45, 85, 0.2);
      border: 1px solid var(--primary-red);
      color: var(--primary-red);
    }

    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
    }

    .toast {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 15px 20px;
      margin-bottom: 10px;
      min-width: 250px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Online Status Indicator */
    .online-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .online-status.online {
      background: rgba(52, 199, 89, 0.2);
      color: #34C759;
      border: 1px solid #34C759;
    }

    .online-status.offline {
      background: rgba(255, 59, 48, 0.2);
      color: #FF3B30;
      border: 1px solid #FF3B30;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .online .status-dot {
      background: #34C759;
    }

    .offline .status-dot {
      background: #FF3B30;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Sync indicator */
    .sync-indicator {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 11px;
      color: var(--text-secondary);
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    @media (max-width: 600px) {
      .game-container {
        margin-top: 20px;
        padding: 15px;
      }

      .monster-emoji {
        font-size: 80px;
      }

      .stat-box {
        padding: 12px;
      }

      .stats-bar {
        grid-template-columns: 1fr 1fr;
      }

      .stat-box:last-child {
        grid-column: span 2;
      }
    }
  </style>
</head>
<body>
  <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 20%, rgba(255, 45, 85, 0.15) 0%, transparent 50%); z-index: -2;"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">⚔️ TAP TAP WAR</a>
    <div class="user-info">
      <span id="vip-badge" class="vip-badge-nav" style="display: none;">VIP</span>
      <a href="shop.html" style="color: var(--text-secondary); text-decoration: none; margin-right: 15px;">🛒 Shop</a>
      <a href="topup.html" style="color: var(--text-secondary); text-decoration: none; margin-right: 15px;">💰 Topup</a>
      <a href="leaderboard.html" style="color: var(--text-secondary); text-decoration: none; margin-right: 15px;">🏆 Rank</a>
      <button onclick="logout()" style="background: none; border: none; color: var(--text-secondary); cursor: pointer;">Logout</button>
    </div>
  </nav>

  <div class="game-container">
    <div class="stats-bar">
      <div class="stat-box">
        <div class="stat-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Coins</div>
        <div class="stat-value" id="coin">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Level</div>
        <div class="stat-value" id="level">1</div>
      </div>
    </div>

    <div class="monster-box" id="monster-box">
      <span class="monster-emoji" id="monster">👹</span>
      <div class="monster-level" id="monster-level">Level 1 - Monster</div>
      <div class="hp-bar">
        <div class="hp-fill" id="hp-fill" style="width: 100%"></div>
      </div>
      <div class="hp-text" id="hp-text">100 / 100</div>
    </div>

    <div class="buttons-group">
      <button class="btn" onclick="tapMonster()">👊 TAP</button>
      <button class="btn secondary" onclick="buyAutoTap()">🤖 Auto Tap</button>
      <button class="btn secondary" onclick="goToShop()">🛒 Shop</button>
    </div>
  </div>

  <!-- Online Status Indicator -->
  <div id="online-status" class="online-status offline">
    <span class="status-dot"></span>
    <span id="status-text">Connecting...</span>
  </div>

  <!-- Sync Indicator -->
  <div class="sync-indicator">
    <span id="last-sync">Waiting for sync...</span>
  </div>

  <div class="toast-container"></div>

  <script src="script.js"></script>
  <script>
    // Check login status and init game
    document.addEventListener('DOMContentLoaded', function() {
      const user = typeof getSession === 'function' ? getSession() : null;
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      // Initialize the game - CRITICAL FIX
      if (typeof initPage === 'function') {
        initPage();
      }
    });
  </script>
</body>
</html>
