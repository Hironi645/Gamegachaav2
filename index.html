<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ BLITZ CLICKER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --cyan: #00fff7;
    --pink: #ff006e;
    --yellow: #ffe600;
    --green: #00ff88;
    --dark: #060810;
    --card: #0d1424;
    --card2: #111827;
    --border: rgba(0,255,247,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--dark);
    color: #e0e0e0;
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,255,247,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,247,0.025) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events:none; z-index:0;
  }
  .particles { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .particle {
    position:absolute; width:2px; height:2px;
    background:var(--cyan); border-radius:50%; opacity:0;
    animation:floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform:translateY(100vh) translateX(0); opacity:0; }
    10%  { opacity:0.6; }
    90%  { opacity:0.3; }
    100% { transform:translateY(-10vh) translateX(40px); opacity:0; }
  }
  .wrapper { position:relative; z-index:2; max-width:860px; margin:0 auto; padding:0 16px 80px; }

  /* HEADER */
  .header { text-align:center; padding:48px 0 36px; animation:fadeDown 0.7s ease both; }
  .live-badge {
    display:inline-flex; align-items:center; gap:8px;
    font-size:10px; letter-spacing:4px; color:var(--green);
    border:1px solid rgba(0,255,136,0.3); padding:5px 14px;
    margin-bottom:18px; text-transform:uppercase; border-radius:20px;
  }
  .live-dot { width:7px; height:7px; background:var(--green); border-radius:50%; animation:blink 1.2s infinite; box-shadow:0 0 8px var(--green); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  h1 {
    font-family:'Orbitron',sans-serif;
    font-size:clamp(2.4rem,8vw,4.5rem); font-weight:900; letter-spacing:3px;
    background:linear-gradient(135deg, var(--cyan) 0%, #fff 50%, var(--pink) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    filter:drop-shadow(0 0 30px rgba(0,255,247,0.35)); line-height:1.1;
  }
  .tagline { margin-top:10px; font-size:12px; letter-spacing:3px; color:rgba(255,255,255,0.3); text-transform:uppercase; }

  /* LAYOUT */
  .layout { display:grid; grid-template-columns:1fr 1fr; gap:20px; animation:fadeUp 0.7s 0.15s both; }
  @media(max-width:620px){ .layout{ grid-template-columns:1fr; } }

  /* PANEL */
  .panel {
    background:var(--card); border:1px solid var(--border);
    border-radius:8px; padding:26px; position:relative; overflow:hidden;
  }
  .panel::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg, var(--cyan), transparent 70%);
  }
  .panel-title { font-family:'Orbitron',sans-serif; font-size:10px; font-weight:700; letter-spacing:4px; color:var(--cyan); text-transform:uppercase; margin-bottom:22px; opacity:0.8; }

  /* INPUTS */
  .field { margin-bottom:14px; }
  .field label { display:block; font-size:10px; letter-spacing:2px; color:rgba(255,255,255,0.35); text-transform:uppercase; margin-bottom:7px; }
  .field input {
    width:100%; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
    color:#fff; padding:10px 14px; font-family:'Share Tech Mono',monospace;
    font-size:14px; border-radius:4px; outline:none; transition:all 0.2s;
  }
  .field input:focus { border-color:var(--cyan); box-shadow:0 0 0 2px rgba(0,255,247,0.1),0 0 20px rgba(0,255,247,0.15); }
  .field input::placeholder { color:rgba(255,255,255,0.2); }

  /* BUTTONS */
  .btn { width:100%; border:none; padding:13px; font-family:'Orbitron',sans-serif; font-size:12px; font-weight:700; letter-spacing:3px; text-transform:uppercase; cursor:pointer; border-radius:4px; transition:all 0.2s; margin-top:4px; }
  .btn-cyan { background:transparent; border:2px solid var(--cyan); color:var(--cyan); }
  .btn-cyan:hover:not(:disabled) { background:var(--cyan); color:#000; box-shadow:0 0 30px rgba(0,255,247,0.4); transform:translateY(-1px); }
  .btn:disabled { opacity:0.3; cursor:not-allowed; transform:none !important; }
  .status-msg { text-align:center; padding:10px; font-size:12px; border-radius:4px; margin-top:12px; display:none; letter-spacing:1px; }
  .status-msg.error { display:block; background:rgba(255,0,110,0.08); border:1px solid rgba(255,0,110,0.3); color:var(--pink); }

  /* GAME */
  #game-panel { display:none; }
  .score-wrap { text-align:center; margin-bottom:18px; }
  .score-num {
    font-family:'Orbitron',sans-serif; font-size:4rem; font-weight:900; color:var(--cyan);
    text-shadow:0 0 30px rgba(0,255,247,0.6),0 0 60px rgba(0,255,247,0.3); line-height:1; transition:transform 0.08s;
  }
  .score-num.pop { transform:scale(1.18); color:var(--yellow); text-shadow:0 0 30px rgba(255,230,0,0.8); }
  .score-lbl { font-size:10px; letter-spacing:3px; color:rgba(255,255,255,0.3); margin-top:4px; }
  .timer-wrap { margin-bottom:18px; }
  .timer-info { display:flex; justify-content:space-between; font-size:11px; color:rgba(255,255,255,0.4); margin-bottom:6px; }
  .timer-track { background:rgba(255,255,255,0.07); border-radius:3px; height:5px; overflow:hidden; }
  .timer-fill { height:100%; background:linear-gradient(90deg,var(--cyan),var(--pink)); border-radius:3px; transition:width 0.1s linear; width:100%; }

  .click-target {
    width:120px; height:120px; margin:0 auto 16px;
    border-radius:50%;
    background:radial-gradient(circle at 35% 35%, rgba(0,255,247,0.25), rgba(0,255,247,0.05));
    border:2px solid var(--cyan);
    display:flex; align-items:center; justify-content:center;
    font-size:3rem; cursor:pointer; transition:all 0.08s;
    box-shadow:0 0 30px rgba(0,255,247,0.2),inset 0 0 20px rgba(0,255,247,0.08);
    user-select:none; position:relative; overflow:hidden;
  }
  .click-target:active { transform:scale(0.9); box-shadow:0 0 60px rgba(0,255,247,0.5),inset 0 0 30px rgba(0,255,247,0.2); }
  .click-target.disabled { opacity:0.3; cursor:not-allowed; pointer-events:none; }
  .float-text {
    position:absolute; font-family:'Orbitron',sans-serif; font-size:16px; font-weight:700;
    color:var(--yellow); pointer-events:none; animation:floatText 0.8s ease-out forwards;
    z-index:999; text-shadow:0 0 10px rgba(255,230,0,0.8);
  }
  @keyframes floatText { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-60px) scale(1.4)} }
  .hint-text { text-align:center; font-size:11px; color:rgba(255,255,255,0.25); letter-spacing:2px; }

  /* LEADERBOARD */
  .leaderboard-section { margin-top:28px; animation:fadeUp 0.7s 0.3s both; }
  .lb-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .lb-title { font-family:'Orbitron',sans-serif; font-size:13px; font-weight:700; letter-spacing:4px; color:var(--yellow); text-transform:uppercase; text-shadow:0 0 20px rgba(255,230,0,0.4); }
  .lb-count { font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:2px; }
  .lb-list { display:flex; flex-direction:column; gap:8px; }
  .lb-item {
    background:var(--card2); border:1px solid rgba(255,255,255,0.06);
    border-radius:5px; padding:12px 18px; display:flex; align-items:center; gap:14px;
    transition:all 0.3s; animation:slideIn 0.4s ease both; position:relative; overflow:hidden;
  }
  .lb-item.rank-1 { border-color:rgba(255,230,0,0.35); background:linear-gradient(135deg,rgba(255,230,0,0.06),var(--card2)); }
  .lb-item.rank-2 { border-color:rgba(192,192,192,0.25); background:linear-gradient(135deg,rgba(192,192,192,0.05),var(--card2)); }
  .lb-item.rank-3 { border-color:rgba(205,127,50,0.25); background:linear-gradient(135deg,rgba(205,127,50,0.05),var(--card2)); }
  .lb-item.is-me::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--cyan); box-shadow:0 0 10px var(--cyan); }
  @keyframes slideIn { from{opacity:0;transform:translateX(-20px)} to{opacity:1;transform:translateX(0)} }
  .rank-badge { font-family:'Orbitron',sans-serif; font-size:14px; font-weight:900; width:32px; text-align:center; flex-shrink:0; }
  .rank-1 .rank-badge { color:var(--yellow); text-shadow:0 0 12px rgba(255,230,0,0.7); }
  .rank-2 .rank-badge { color:#c0c0c0; }
  .rank-3 .rank-badge { color:#cd7f32; }
  .lb-name { flex:1; font-size:14px; color:#fff; letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lb-name .you-tag { font-size:9px; color:var(--cyan); letter-spacing:2px; margin-left:8px; opacity:0.7; }
  .lb-score { font-family:'Orbitron',sans-serif; font-size:16px; font-weight:700; color:var(--cyan); flex-shrink:0; }
  .lb-time { font-size:10px; color:rgba(255,255,255,0.2); flex-shrink:0; letter-spacing:1px; }
  .lb-empty { text-align:center; padding:40px 20px; color:rgba(255,255,255,0.2); font-size:13px; letter-spacing:2px; border:1px dashed rgba(255,255,255,0.08); border-radius:5px; }
  .lb-loading { text-align:center; padding:30px; color:var(--cyan); font-size:12px; letter-spacing:3px; animation:blink 1.2s infinite; }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-24px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp   { from{opacity:0;transform:translateY(24px)}  to{opacity:1;transform:translateY(0)} }

  /* OVERLAY */
  .overlay { position:fixed; inset:0; background:rgba(6,8,16,0.92); z-index:100; display:none; align-items:center; justify-content:center; backdrop-filter:blur(6px); }
  .overlay.show { display:flex; }
  .result-box {
    background:var(--card); border:1px solid var(--border); border-radius:12px;
    padding:44px 36px; text-align:center; max-width:380px; width:90%;
    position:relative; animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .result-box::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--cyan),var(--pink)); border-radius:12px 12px 0 0; }
  @keyframes popIn { from{opacity:0;transform:scale(0.7)} to{opacity:1;transform:scale(1)} }
  .result-emoji { font-size:3.5rem; margin-bottom:12px; }
  .result-title { font-family:'Orbitron',sans-serif; font-size:1.4rem; font-weight:900; color:var(--yellow); text-shadow:0 0 20px rgba(255,230,0,0.5); margin-bottom:8px; letter-spacing:2px; }
  .result-player { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:20px; letter-spacing:2px; }
  .result-score { font-family:'Orbitron',sans-serif; font-size:3.5rem; font-weight:900; color:var(--cyan); text-shadow:0 0 40px rgba(0,255,247,0.6); line-height:1; margin-bottom:6px; }
  .result-score-lbl { font-size:11px; letter-spacing:3px; color:rgba(255,255,255,0.3); margin-bottom:28px; }
  .result-rank { font-size:13px; color:rgba(255,255,255,0.5); margin-bottom:28px; letter-spacing:1px; }
  .result-rank span { color:var(--yellow); font-weight:bold; }
  .btn-play-again {
    background:linear-gradient(135deg,var(--cyan),var(--pink)); color:#000; border:none;
    padding:14px 32px; font-family:'Orbitron',sans-serif; font-size:13px; font-weight:900;
    letter-spacing:2px; cursor:pointer; border-radius:4px; transition:all 0.2s;
    text-transform:uppercase; width:100%;
  }
  .btn-play-again:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,255,247,0.3); }
  .saving-indicator { position:fixed; top:20px; right:20px; background:rgba(0,255,136,0.1); border:1px solid rgba(0,255,136,0.3); color:var(--green); padding:8px 16px; font-size:11px; letter-spacing:2px; border-radius:4px; z-index:99; display:none; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="saving-indicator" id="saving-indicator">⚡ MENYIMPAN SKOR...</div>

<!-- Result Overlay -->
<div class="overlay" id="overlay">
  <div class="result-box">
    <div class="result-emoji">🏆</div>
    <div class="result-title">GAME OVER!</div>
    <div class="result-player" id="result-player">—</div>
    <div class="result-score" id="result-score">0</div>
    <div class="result-score-lbl">KLIK TOTAL</div>
    <div class="result-rank" id="result-rank"></div>
    <button class="btn-play-again" id="btn-play-again">▶ MAIN LAGI</button>
  </div>
</div>

<div class="wrapper">
  <div class="header">
    <div class="live-badge">
      <div class="live-dot"></div>
      REALTIME FIREBASE
    </div>
    <h1>BLITZ<br>CLICKER</h1>
    <p class="tagline">Klik secepat mungkin — 10 detik!</p>
  </div>

  <div class="layout">
    <!-- Kiri: Setup / Game -->
    <div>
      <div class="panel" id="setup-panel">
        <div class="panel-title">▸ Masuk &amp; Main</div>
        <div class="field">
          <label>Nama Pemain</label>
          <input type="text" id="player-name" placeholder="Masukkan namamu..." maxlength="20" />
        </div>
        <button class="btn btn-cyan" id="btn-join">⚡ MULAI MAIN</button>
        <div class="status-msg" id="status-msg"></div>
      </div>

      <div class="panel" id="game-panel">
        <div class="panel-title">▸ <span id="playing-name">Player</span></div>
        <div class="score-wrap">
          <div class="score-num" id="score-display">0</div>
          <div class="score-lbl">KLIK</div>
        </div>
        <div class="timer-wrap">
          <div class="timer-info">
            <span>WAKTU</span>
            <span id="timer-text">10.0s</span>
          </div>
          <div class="timer-track">
            <div class="timer-fill" id="timer-fill"></div>
          </div>
        </div>
        <div class="click-target" id="click-target">⚡</div>
        <div class="hint-text" id="hint-text">TAP SECEPAT MUNGKIN!</div>
      </div>
    </div>

    <!-- Kanan: Leaderboard Live -->
    <div>
      <div class="panel" style="height:100%">
        <div class="panel-title">▸ Top 5 Live</div>
        <div id="lb-content"><div class="lb-loading">MEMUAT DATA...</div></div>
      </div>
    </div>
  </div>

  <!-- Full Leaderboard -->
  <div class="leaderboard-section">
    <div class="lb-header">
      <div class="lb-title">🏆 Hall of Fame</div>
      <div class="lb-count" id="total-players">— pemain</div>
    </div>
    <div class="lb-list" id="lb-full"></div>
  </div>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, query, orderByChild, limitToLast, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ── Firebase config (database kamu) ──────────────────────
  const app = initializeApp({
    databaseURL: "https://game-9b3b9-default-rtdb.asia-southeast1.firebasedatabase.app/"
  });
  const db = getDatabase(app);

  // ── State ─────────────────────────────────────────────────
  let playerName    = '';
  let score         = 0;
  let gameActive    = false;
  let timerInterval = null;
  let timeLeft      = 10.0;
  const DURATION    = 10.0;
  let allScores     = [];
  let myLatestScore = null;

  // ── Particles ─────────────────────────────────────────────
  const pw = document.getElementById('particles');
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;animation-duration:${5+Math.random()*10}s;animation-delay:${Math.random()*10}s;width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;background:${Math.random()>.5?'#00fff7':'#ff006e'};`;
    pw.appendChild(p);
  }

  // ── Join ──────────────────────────────────────────────────
  function joinGame() {
    const name = document.getElementById('player-name').value.trim();
    if (!name) { showStatus('Masukkan namamu dulu!', 'error'); return; }
    playerName = name;
    document.getElementById('playing-name').textContent = name;
    document.getElementById('setup-panel').style.display = 'none';
    document.getElementById('game-panel').style.display  = 'block';
    startGame();
  };

  // ── Game ──────────────────────────────────────────────────
  function startGame() {
    score = 0; timeLeft = DURATION; gameActive = true; myLatestScore = null;
    document.getElementById('score-display').textContent = '0';
    document.getElementById('click-target').classList.remove('disabled');
    document.getElementById('hint-text').textContent = 'TAP SECEPAT MUNGKIN!';
    updateBar();
    timerInterval = setInterval(() => {
      timeLeft = Math.max(0, timeLeft - 0.1);
      updateBar();
      if (timeLeft <= 0) endGame();
    }, 100);
  }

  function updateBar() {
    const pct = (timeLeft / DURATION) * 100;
    document.getElementById('timer-fill').style.width = pct + '%';
    document.getElementById('timer-text').textContent = timeLeft.toFixed(1) + 's';
    const fill = document.getElementById('timer-fill');
    fill.style.background = pct < 30
      ? 'linear-gradient(90deg,#ff006e,#ff4444)'
      : pct < 60
      ? 'linear-gradient(90deg,#ffe600,#ff006e)'
      : 'linear-gradient(90deg,#00fff7,#ff006e)';
  }

  function handleClick(e) {
    if (!gameActive) return;
    score++;
    const el = document.getElementById('score-display');
    el.textContent = score;
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
    setTimeout(() => el.classList.remove('pop'), 80);

    const ft = document.createElement('div');
    ft.className = 'float-text';
    ft.textContent = '+1';
    const r = e.currentTarget.getBoundingClientRect();
    ft.style.left = (e.clientX - r.left) + 'px';
    ft.style.top  = (e.clientY - r.top - 10) + 'px';
    e.currentTarget.appendChild(ft);
    setTimeout(() => ft.remove(), 800);
  };

  function endGame() {
    clearInterval(timerInterval);
    gameActive = false;
    document.getElementById('click-target').classList.add('disabled');
    document.getElementById('hint-text').textContent = 'Menyimpan skor...';
    saveScore();
  }

  // ── Save to Firebase ──────────────────────────────────────
  async function saveScore() {
    document.getElementById('saving-indicator').style.display = 'block';
    try {
      await push(ref(db, 'scores'), {
        name: playerName, score, timestamp: serverTimestamp()
      });
      myLatestScore = score;
      showResult();
    } catch (err) {
      console.error(err);
      document.getElementById('hint-text').textContent = '❌ Gagal simpan! Cek koneksi.';
    } finally {
      document.getElementById('saving-indicator').style.display = 'none';
    }
  }

  // ── Realtime listener ─────────────────────────────────────
  onValue(
    query(ref(db, 'scores'), orderByChild('score'), limitToLast(100)),
    (snap) => {
      const data = snap.val();
      if (!data) { renderLB([]); return; }
      const arr = Object.entries(data)
        .map(([id, v]) => ({ id, name: v.name, score: v.score, timestamp: v.timestamp }))
        .sort((a, b) => b.score - a.score);
      allScores = arr;
      renderLB(arr);
    }
  );

  // ── Render leaderboard ────────────────────────────────────
  function renderLB(arr) {
    const medals = ['🥇','🥈','🥉'];
    const build = (item, rank) => {
      const isMe = item.name === playerName && item.score === myLatestScore;
      return `<div class="lb-item ${rank<=3?'rank-'+rank:''} ${isMe?'is-me':''}" style="animation-delay:${(rank-1)*0.04}s">
        <div class="rank-badge">${rank<=3?medals[rank-1]:'#'+rank}</div>
        <div class="lb-name">${esc(item.name)}${isMe?'<span class="you-tag">◀ KAMU</span>':''}</div>
        <div class="lb-score">${item.score}</div>
        <div class="lb-time">${timeAgo(item.timestamp)}</div>
      </div>`;
    };

    const empty = '<div class="lb-empty">Belum ada skor.<br>Jadilah yang pertama! 🚀</div>';
    document.getElementById('lb-content').innerHTML = arr.length
      ? arr.slice(0,5).map((x,i) => build(x,i+1)).join('')
      : empty;
    document.getElementById('lb-full').innerHTML = arr.length
      ? arr.map((x,i) => build(x,i+1)).join('')
      : empty;
    document.getElementById('total-players').textContent = arr.length + ' pemain';
  }

  // ── Result overlay ────────────────────────────────────────
  function showResult() {
    document.getElementById('result-player').textContent = playerName;
    document.getElementById('result-score').textContent  = score;
    const rank = allScores.findIndex(s => s.name === playerName && s.score === score) + 1;
    const total = allScores.length;
    const msgs = ['','🥇 KAMU NOMOR 1! LUAR BIASA!','🥈 TOP 2 — Hampir sempurna!','🥉 TOP 3 — Keren!'];
    document.getElementById('result-rank').innerHTML = rank <= 3
      ? msgs[rank]
      : `Peringkat ke-<span>${rank}</span> dari ${total} pemain`;
    document.getElementById('overlay').classList.add('show');
  }

  function playAgain() {
    document.getElementById('overlay').classList.remove('show');
    startGame();
  };

  // ── Helpers ───────────────────────────────────────────────
  function showStatus(msg, type) {
    const el = document.getElementById('status-msg');
    el.textContent = msg; el.className = 'status-msg ' + type;
  }
  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function timeAgo(ts) {
    if (!ts) return '';
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60)  return s + 'd lalu';
    const m = Math.floor(s/60);
    if (m < 60)  return m + 'm lalu';
    return Math.floor(m/60) + 'j lalu';
  }

  // ── Event Listeners ───────────────────────────────────────
  document.getElementById('btn-join').addEventListener('click', joinGame);
  document.getElementById('click-target').addEventListener('click', handleClick);
  document.getElementById('btn-play-again').addEventListener('click', playAgain);
  document.getElementById('player-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') joinGame();
  });
</script>
</body>
</html>
