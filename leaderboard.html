<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAP TAP WAR - Leaderboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');

    :root {
      --primary-red: #FF2D55;
      --dark-bg: #000000;
      --card-bg: rgba(28, 28, 30, 0.85);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--dark-bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      backdrop-filter: blur(10px);
      background: rgba(28, 28, 30, 0.5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-logo {
      font-weight: 700;
      font-size: 20px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-title {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 40px;
      background: linear-gradient(135deg, var(--primary-red), #FF6B6B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .leaderboard-item {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      display: grid;
      grid-template-columns: 50px 1fr 100px;
      gap: 16px;
      align-items: center;
      transition: transform 0.3s;
    }

    .leaderboard-item:hover {
      transform: translateX(5px);
    }

    .rank-badge {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .rank-badge.gold { color: #FFD700; font-size: 24px; }
    .rank-badge.silver { color: #C0C0C0; font-size: 24px; }
    .rank-badge.bronze { color: #CD7F32; font-size: 24px; }

    .player-info {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-red), #FF6B6B);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }

    .player-details h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .player-details p {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .player-score {
      text-align: right;
      font-weight: 700;
      font-size: 18px;
      color: var(--primary-red);
    }

    .vip-badge {
      display: inline-block;
      background: linear-gradient(135deg, #FFD700, #FF9500);
      color: #000;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }

    @media (max-width: 600px) {
      .leaderboard-item {
        grid-template-columns: 40px 1fr 80px;
        padding: 12px;
      }

      .page-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 20%, rgba(255, 45, 85, 0.15) 0%, transparent 50%); z-index: -2;"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">⚔️ TAP TAP WAR</a>
    <div>
      <a href="index.html" style="color: var(--text-secondary); text-decoration: none;">Home</a>
    </div>
  </nav>

  <div class="container">
    <h1 class="page-title">🏆 LEADERBOARD</h1>

    <div class="leaderboard-list" id="leaderboard-list">
      <div style="text-align: center; padding: 40px; color: var(--text-secondary);">Loading...</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
