<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAP TAP WAR - Leaderboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');

    :root {
      --primary-red: #FF2D55;
      --dark-bg: #000000;
      --card-bg: rgba(28, 28, 30, 0.85);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--dark-bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      backdrop-filter: blur(10px);
      background: rgba(28, 28, 30, 0.5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-logo {
      font-weight: 700;
      font-size: 20px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-title {
      text-align: center;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 40px;
      background: linear-gradient(135deg, var(--primary-red), #FF6B6B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .leaderboard-item {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      display: grid;
      grid-template-columns: 50px 1fr 100px;
      gap: 16px;
      align-items: center;
      transition: transform 0.3s;
    }

    .leaderboard-item:hover {
      transform: translateX(5px);
    }

    .rank-badge {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
    }

    .rank-badge.gold { color: #FFD700; font-size: 24px; }
    .rank-badge.silver { color: #C0C0C0; font-size: 24px; }
    .rank-badge.bronze { color: #CD7F32; font-size: 24px; }

    .player-info {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .player-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-red), #FF6B6B);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }

    .player-details h4 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .player-details p {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .player-score {
      text-align: right;
      font-weight: 700;
      font-size: 18px;
      color: var(--primary-red);
    }

    .vip-badge {
      display: inline-block;
      background: linear-gradient(135deg, #FFD700, #FF9500);
      color: #000;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }

    /* Loading Animation */
    .loading-item {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-secondary);
    }

    .loading-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 45, 85, 0.2);
      border-top: 2px solid #FF2D55;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Database Status */
    .db-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .db-status.online {
      background: rgba(52, 199, 89, 0.2);
      color: #34C759;
      border: 1px solid #34C759;
    }

    .db-status.offline {
      background: rgba(255, 59, 48, 0.2);
      color: #FF3B30;
      border: 1px solid #FF3B30;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .online .status-dot {
      background: #34C759;
    }

    .offline .status-dot {
      background: #FF3B30;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 600px) {
      .leaderboard-item {
        grid-template-columns: 40px 1fr 80px;
        padding: 12px;
      }

      .page-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 20%, rgba(255, 45, 85, 0.15) 0%, transparent 50%); z-index: -2;"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">⚔️ TAP TAP WAR</a>
    <div>
      <a href="game.html" style="color: var(--text-secondary); text-decoration: none; margin-right: 15px;">Game</a>
      <a href="shop.html" style="color: var(--text-secondary); text-decoration: none; margin-right: 15px;">Shop</a>
      <a href="topup.html" style="color: var(--text-secondary); text-decoration: none; margin-right: 15px;">Topup</a>
      <button onclick="if(typeof logout === 'function') logout(); else window.location.href='login.html';" style="background: none; border: none; color: var(--text-secondary); cursor: pointer;">Logout</button>
    </div>
  </nav>

  <div class="container">
    <h1 class="page-title">🏆 LEADERBOARD</h1>

    <div class="leaderboard-list" id="leaderboard-list">
      <div class="loading-item">
        <div class="loading-spinner"></div>
        <span>Loading leaderboard from database...</span>
      </div>
    </div>
  </div>

  <!-- Database Status Indicator -->
  <div id="db-status" class="db-status offline">
    <span class="status-dot"></span>
    <span id="db-status-label">Connecting...</span>
  </div>

  <script src="script.js"></script>
  <script>
    // Check API status and load leaderboard
    document.addEventListener('DOMContentLoaded', function() {
      // Initialize page and load leaderboard - CRITICAL FIX
      if (typeof initPage === 'function') {
        initPage();
      }
      
      // Also directly call loadLeaderboard to ensure it loads
      if (typeof loadLeaderboard === 'function') {
        loadLeaderboard();
      }
      
      const dbStatus = document.getElementById('db-status');
      const dbStatusLabel = document.getElementById('db-status-label');
      
      if (typeof CONFIG !== 'undefined' && typeof apiRequest === 'function') {
        apiRequest('ping', {}).then(result => {
          if (result.success) {
            if (dbStatus) {
              dbStatus.className = 'db-status online';
              dbStatusLabel.textContent = 'Database Online';
            }
          }
        }).catch(() => {
          if (dbStatus) {
            dbStatus.className = 'db-status offline';
            dbStatusLabel.textContent = 'Database Offline';
          }
        });
      }
    });
  </script>
</body>
</html>
