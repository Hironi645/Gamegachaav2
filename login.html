<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAP TAP WAR - Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');

    :root {
      --primary-red: #FF2D55;
      --dark-bg: #000000;
      --card-bg: rgba(28, 28, 30, 0.85);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #000000 0%, #1a0000 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .auth-box {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .auth-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 30px;
      text-align: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary-red);
      background: rgba(255, 45, 85, 0.05);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--primary-red), #C41E3A);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
      transition: transform 0.2s;
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    .auth-link {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-link a {
      color: var(--primary-red);
      text-decoration: none;
      font-weight: 600;
    }

    .back-link {
      text-align: center;
      margin-top: 15px;
    }

    .back-link a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 15px 20px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    /* Database Status */
    .db-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .db-status.online {
      background: rgba(52, 199, 89, 0.2);
      color: #34C759;
      border: 1px solid #34C759;
    }

    .db-status.offline {
      background: rgba(255, 59, 48, 0.2);
      color: #FF3B30;
      border: 1px solid #FF3B30;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .online .status-dot {
      background: #34C759;
    }

    .offline .status-dot {
      background: #FF3B30;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1 class="auth-title">⚔️ LOGIN</h1>
      
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" required placeholder="Enter your username">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="Enter your password">
        </div>

        <button type="submit" class="submit-btn">LOGIN</button>
      </form>

      <div class="auth-link">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
      
      <div class="back-link">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </div>

  <!-- Database Status Indicator -->
  <div id="db-status" class="db-status offline">
    <span class="status-dot"></span>
    <span id="db-status-label">Connecting...</span>
  </div>

  <script src="script.js"></script>
  <script>
    // Check API status
    document.addEventListener('DOMContentLoaded', function() {
      const dbStatus = document.getElementById('db-status');
      const dbStatusLabel = document.getElementById('db-status-label');
      
      if (typeof CONFIG !== 'undefined' && typeof apiRequest === 'function') {
        apiRequest('ping', {}).then(result => {
          if (result.success) {
            if (dbStatus) {
              dbStatus.className = 'db-status online';
              dbStatusLabel.textContent = 'Database Online';
            }
          }
        }).catch(() => {
          if (dbStatus) {
            dbStatus.className = 'db-status offline';
            dbStatusLabel.textContent = 'Database Offline';
          }
        });
      }
    });
  </script>
</body>
</html>
