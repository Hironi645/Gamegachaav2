<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAP TAP WAR - Shop</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');

    :root {
      --primary-red: #FF2D55;
      --dark-bg: #000000;
      --card-bg: rgba(28, 28, 30, 0.85);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --vip-gold: #FFD700;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--dark-bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      backdrop-filter: blur(10px);
      background: rgba(28, 28, 30, 0.5);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nav-logo {
      font-weight: 700;
      font-size: 20px;
      text-decoration: none;
      color: var(--text-primary);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .shop-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }

    .shop-title {
      font-size: 32px;
      font-weight: 700;
    }

    .user-coin {
      background: linear-gradient(135deg, var(--primary-red), #C41E3A);
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
    }

    .shop-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 20px;
    }

    .shop-tab {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-weight: 600;
      padding: 8px 16px;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
    }

    .shop-tab.active {
      color: var(--primary-red);
      border-bottom-color: var(--primary-red);
    }

    .shop-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
    }

    .shop-item {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative;
    }

    .shop-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(255, 45, 85, 0.2);
    }

    .shop-item.vip {
      border-color: var(--vip-gold);
    }

    .shop-item.vip::before {
      content: '👑';
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 20px;
    }

    .shop-item.owned {
      opacity: 0.6;
    }

    .shop-item.owned .buy-btn {
      background: #34C759;
      cursor: not-allowed;
    }

    .item-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .item-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .item-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 15px;
      min-height: 32px;
    }

    .item-price {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary-red);
      margin-bottom: 12px;
    }

    .buy-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, var(--primary-red), #C41E3A);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .buy-btn:active {
      transform: scale(0.95);
    }

    .buy-btn:disabled {
      background: #34C759;
      cursor: not-allowed;
    }

    /* Loading Animation */
    .loading-item {
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-secondary);
      grid-column: 1 / -1;
    }

    .loading-spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255, 45, 85, 0.2);
      border-top: 3px solid #FF2D55;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 15px 20px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    /* Database Status */
    .db-status {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .db-status.online {
      background: rgba(52, 199, 89, 0.2);
      color: #34C759;
      border: 1px solid #34C759;
    }

    .db-status.offline {
      background: rgba(255, 59, 48, 0.2);
      color: #FF3B30;
      border: 1px solid #FF3B30;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .online .status-dot {
      background: #34C759;
    }

    .offline .status-dot {
      background: #FF3B30;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (max-width: 600px) {
      .shop-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .shop-header {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>
<body>
  <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 20%, rgba(255, 45, 85, 0.15) 0%, transparent 50%); z-index: -2;"></div>

  <nav class="navbar">
    <a href="index.html" class="nav-logo">⚔️ TAP TAP WAR</a>
    <div>
      <a href="game.html" style="color: var(--text-secondary); text-decoration: none; margin-right: 15px;">Game</a>
      <a href="topup.html" style="color: var(--text-secondary); text-decoration: none; margin-right: 15px;">💰 Topup</a>
      <button onclick="logout()" style="background: none; border: none; color: var(--text-secondary); cursor: pointer;">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="shop-header">
      <h1 class="shop-title">🛒 SHOP</h1>
      <div class="user-coin">🪙 <span id="user-coin">1000</span></div>
    </div>

    <div class="shop-tabs">
      <button class="shop-tab active" onclick="filterItems('all')">All Items</button>
      <button class="shop-tab" onclick="filterItems('power')">Power-ups</button>
      <button class="shop-tab" onclick="filterItems('vip')">VIP</button>
    </div>

    <div class="shop-grid" id="shop-grid">
      <div class="loading-item">
        <div class="loading-spinner"></div>
        <span>Loading items from database...</span>
      </div>
    </div>
  </div>

  <!-- Database Status Indicator -->
  <div id="db-status" class="db-status offline">
    <span class="status-dot"></span>
    <span id="db-status-label">Connecting...</span>
  </div>

  <script src="script.js"></script>
  <script>
    // Filter items function - CRITICAL FIX
    let currentFilter = 'all';
    function filterItems(type) {
      currentFilter = type;
      // Update active tab
      document.querySelectorAll('.shop-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      event.target.classList.add('active');
      
      // Re-render shop with filter
      if (typeof renderShop === 'function') {
        renderShop();
      }
    }
    
    // Override renderShop to support filtering
    const originalRenderShop = renderShop;
    renderShop = function() {
      const grid = document.getElementById('shop-grid');
      if (!grid) return;

      let items = GameState.shopItems || [];
      
      // Apply filter
      if (currentFilter !== 'all') {
        items = items.filter(item => item.type === currentFilter);
      }

      if (items.length === 0) {
        grid.innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-secondary);">No items found</div>';
        return;
      }

      grid.innerHTML = items.map(item => {
        const owned = GameState.inventory.some(i => 
          (typeof i === 'string' ? i : i.item) === item.name
        );
        const isAvailable = item.availability === 'active';
        
        return `
          <div class="shop-item ${item.type === 'vip' ? 'vip' : ''} ${owned ? 'owned' : ''}" 
               style="background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); 
                      border-radius: 12px; padding: 20px; text-align: center;
                      ${item.type === 'vip' ? 'border-color: #FFD700;' : ''}
                      ${owned ? 'opacity: 0.6;' : ''}">
            <div style="font-size: 48px; margin-bottom: 10px;">${item.icon}</div>
            <div style="font-weight: 600; margin-bottom: 5px;">${item.name}</div>
            <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 15px; min-height: 32px;">${item.desc}</div>
            <div style="font-size: 18px; font-weight: 700; color: #FF2D55; margin-bottom: 12px;">🪙 ${item.price.toLocaleString()}</div>
            <button onclick="buyItem(${item.id})" 
                    style="width: 100%; padding: 10px; background: ${owned ? '#34C759' : 'linear-gradient(135deg, #FF2D55, #C41E3A)'}; 
                           border: none; border-radius: 8px; color: white; font-weight: 600; cursor: ${owned || !isAvailable ? 'not-allowed' : 'pointer'};"
                    ${owned || !isAvailable ? 'disabled' : ''}>
              ${owned ? 'Dimiliki' : !isAvailable ? 'Tidak Tersedia' : 'Beli'}
            </button>
          </div>
        `;
      }).join('');
    };

    // Check login status and init shop
    document.addEventListener('DOMContentLoaded', function() {
      const user = typeof getSession === 'function' ? getSession() : null;
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      
      // Initialize the shop - CRITICAL FIX
      if (typeof initPage === 'function') {
        initPage();
      }
      
      // Check API status
      const dbStatus = document.getElementById('db-status');
      const dbStatusLabel = document.getElementById('db-status-label');
      
      if (typeof CONFIG !== 'undefined' && typeof apiRequest === 'function') {
        apiRequest('ping', {}).then(result => {
          if (result.success) {
            if (dbStatus) {
              dbStatus.className = 'db-status online';
              dbStatusLabel.textContent = 'Database Online';
            }
          }
        }).catch(() => {
          if (dbStatus) {
            dbStatus.className = 'db-status offline';
            dbStatusLabel.textContent = 'Database Offline';
          }
        });
      }
    });
  </script>
</body>
</html>
